<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>صفحه ورود - Nova</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmont font@v33.003/Vazirmont/font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --primary: #0ea5e9;
            --primary-light: #38bdf8;
            --primary-dark: #0284c7;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --bg: #ffffff;
            --bg-secondary: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        body {
            font-family: 'Vazirmont', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from { opacity: 0 }
            to { opacity: 1 }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0 }
            100% { background-position: 200% 0 }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1 }
            50% { opacity: 0.5 }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) }
            50% { transform: translateY(-5px) }
        }

        @keyframes spin {
            to { transform: rotate(360deg) }
        }

        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            top: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            bottom: -50px;
            left: -50px;
            animation: float 10s ease-in-out infinite reverse;
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            background: var(--primary);
            opacity: 0.2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.8s ease-out;
        }

        .login-card {
            background: var(--bg);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                0 0 0 1px rgba(14, 165, 233, 0.08) inset,
                var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #ffffff 100%);
            border: 2px solid var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(14, 165, 233, 0.1) 50%,
                transparent 60%
            );
            animation: shimmer 3s ease-in-out infinite;
        }

        .logo-wrapper svg {
            width: 40px;
            height: 40px;
            fill: url(#logoGradient);
            position: relative;
            z-index: 1;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-light);
        }

        .kv-status-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 28px;
            animation: fadeIn 0.5s ease-out 0.3s backwards;
        }

        .kv-status-box.connected {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .kv-status-box.disconnected {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05));
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .kv-status-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .kv-status-box.connected .kv-status-icon {
            background: var(--success);
        }

        .kv-status-box.disconnected .kv-status-icon {
            background: var(--warning);
        }

        .kv-status-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .kv-status-text {
            text-align: right;
        }

        .kv-status-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .kv-status-box.connected .kv-status-title {
            color: #065f46;
        }

        .kv-status-box.disconnected .kv-status-title {
            color: #92400e;
        }

        .kv-status-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            text-align: right;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 48px 16px 16px;
            border: 2px solid var(--border-light);
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            background: var(--bg-secondary);
            color: var(--text);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--primary);
            background: var(--bg);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: fill 0.3s ease;
        }

        .form-input:focus + .input-icon {
            fill: var(--primary);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 4px 14px rgba(14, 165, 233, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.45);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-loading {
            color: transparent !important;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        .error-message {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            color: var(--error);
            font-size: 13px;
            font-weight: 500;
            animation: fadeInUp 0.3s ease-out;
        }

        .error-message svg {
            width: 18px;
            height: 18px;
            fill: var(--error);
            flex-shrink: 0;
        }

        .error-message.hidden {
            display: none;
        }

        .form-footer {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
            text-align: center;
        }

        .setup-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .setup-link:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .footer-brand {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer-brand a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        @media(max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .login-title {
                font-size: 20px;
            }

            .logo-wrapper {
                width: 64px;
                height: 64px;
            }

            .logo-wrapper svg {
                width: 32px;
                height: 32px;
            }
        }

        @media(max-height: 600px) and (orientation: landscape) {
            .login-container {
                padding: 20px 0;
            }
        }
    </style>
</head>

<body>
    <svg width="0" height="0">
        <defs>
            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#0ea5e9" />
                <stop offset="100%" style="stop-color:#8b5cf6" />
            </linearGradient>
        </defs>
    </svg>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                    </svg>
                </div>
                <h1 class="login-title">صفحه ورود مدیریت</h1>
                <p class="login-subtitle">برای دسترسی به پنل، رمز عبور را وارد کنید</p>
            </div>

            <div class="kv-status-box" id="kvStatus">
                <div class="kv-status-icon">
                    <svg viewBox="0 0 24 24" id="kvStatusIcon">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="kv-status-text">
                    <div class="kv-status-title" id="kvStatusTitle">در حال بررسی...</div>
                    <div class="kv-status-desc" id="kvStatusDesc">لطفاً صبر کنید</div>
                </div>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">رمز عبور</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="رمز عبور را وارد کنید" required autocomplete="current-password">
                        <svg class="input-icon" viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>ورود به پنل</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                        <path d="M10 17l5-5-5-5v3H4v4h6V17zm8-2v-4h-4v4h4zm2-1h-2V7c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v9h2v-5h4v5h2v-7h-2V7h2v7z"/>
                    </svg>
                </button>

                <div class="error-message hidden" id="errorMsg"></div>
            </form>

            <div class="form-footer">
                <a href="/setup" class="setup-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    <span>راه‌اندازی اولیه</span>
                </a>
            </div>

            <div class="footer-brand">
                طراحی شده توسط <a href="https://github.com/IRNova/novatunnel" target="_blank">Nova Tunnel</a>
            </div>
        </div>
    </div>

    <script>
        const kvStatusBox = document.getElementById('kvStatus');
        const kvStatusTitle = document.getElementById('kvStatusTitle');
        const kvStatusDesc = document.getElementById('kvStatusDesc');
        const kvStatusIcon = document.getElementById('kvStatusIcon');
        
        async function checkKVStatus() {
            try {
                const response = await fetch('/api/kv-status');
                const data = await response.json();
                
                if (data.connected) {
                    kvStatusBox.classList.remove('disconnected');
                    kvStatusBox.classList.add('connected');
                    kvStatusTitle.textContent = 'سیستم آماده است';
                    kvStatusDesc.textContent = 'می‌توانید وارد شوید';
                    kvStatusIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
                } else {
                    kvStatusBox.classList.remove('connected');
                    kvStatusBox.classList.add('disconnected');
                    kvStatusTitle.textContent = 'KV متصل نیست';
                    kvStatusDesc.textContent = 'برای عملکرد کامل، KV را متصل کنید';
                    kvStatusIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>';
                }
            } catch (error) {
                kvStatusBox.classList.remove('connected');
                kvStatusBox.classList.add('disconnected');
                kvStatusTitle.textContent = 'خطا در بررسی';
                kvStatusDesc.textContent = 'لطفاً صفحه را رفرش کنید';
            }
        }
        
        checkKVStatus();
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.classList.add('btn-loading');
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'password=' + encodeURIComponent(password)
                });
                
                const contentType = response.headers.get('content-type');
                
                if (response.ok && contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    if (data.success) {
                        window.location.href = data.redirect || '/admin';
                        return;
                    } else {
                        showError(data.error || 'ورود ناموفق بود');
                    }
                } else if (!response.ok) {
                    showError('خطا در ارتباط با سرور');
                } else {
                    showError('رمز عبور اشتباه است');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('خطای شبکه، لطفاً اتصال خود را بررسی کنید');
            } finally {
                loginBtn.disabled = false;
                loginBtn.classList.remove('btn-loading');
            }
        });
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerHTML = `
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span>${message}</span>
            `;
            errorMsg.classList.remove('hidden');
            document.getElementById('password').focus();
            document.getElementById('password').select();
        }
    </script>
</body>

</html>
