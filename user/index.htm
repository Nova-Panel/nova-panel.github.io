<!doctype html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Nova — Your configs</title>
<meta name="nova-userhub-version" content="3.9.0" />
<script>
  // Apply saved theme/lang before paint (no flash).
  (function(){ try{
    var l = localStorage.getItem('nova-user-lang') || 'fa';
    document.documentElement.lang = l; document.documentElement.dir = l==='fa'?'rtl':'ltr';
    var th = localStorage.getItem('nova-theme'); document.documentElement.dataset.theme = th==='light'?'light':'dark';
  }catch(e){} })();
</script>
<style>
  :root{ --bg:#05060a; --card:#0e1118; --card2:#141925; --bd:#222838; --tx:#e9edf6; --mu:#8a93a6; --ac:#7c5cff; --ac2:#02cdf3; --ok:#16a34a; }
  [data-theme="light"]{ --bg:#f4f6fb; --card:#ffffff; --card2:#f0f2f8; --bd:#dfe3ee; --tx:#161a22; --mu:#5b6577; --ac:#6d44f5; --ac2:#0aa6c4; }
  *{ box-sizing:border-box; } html,body{ margin:0; padding:0; }
  body{ background:var(--bg); color:var(--tx); font-family:Inter,Vazirmatn,system-ui,-apple-system,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:920px; margin:0 auto; padding:22px 16px 60px; }
  .top{ display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px; }
  .logo{ width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--ac),var(--ac2)); display:inline-block; }
  .spacer{ flex:1; }
  .seg{ display:inline-flex; border:1px solid var(--bd); border-radius:999px; overflow:hidden; }
  .seg button{ background:transparent; color:var(--mu); border:0; padding:6px 11px; font-size:12.5px; cursor:pointer; }
  .seg button.on{ background:var(--ac); color:#fff; }
  .sub{ color:var(--mu); font-size:13px; margin:2px 0 18px; }
  .uname{ color:var(--ac2); font-weight:600; }
  .rawrow{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; background:var(--card); border:1px solid var(--bd); border-radius:12px; padding:12px 14px; margin-bottom:20px; }
  .rawrow code{ flex:1; min-width:180px; font-size:11.5px; color:var(--mu); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; direction:ltr; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
  .card{ background:var(--card); border:1px solid var(--bd); border-radius:14px; padding:14px; display:flex; flex-direction:column; align-items:center; }
  .card.rec{ border-color:var(--ac); }
  .ch{ display:flex; align-items:center; gap:8px; width:100%; margin-bottom:10px; }
  .ic{ width:26px; height:26px; border-radius:7px; color:#fff; font-weight:700; display:flex; align-items:center; justify-content:center; font-size:13px; }
  .nm{ font-weight:600; font-size:14px; } .pill{ font-size:10px; color:var(--ac); border:1px solid var(--ac); border-radius:999px; padding:1px 7px; margin-inline-start:auto; }
  .qr{ background:#fff; border-radius:10px; padding:8px; width:148px; height:148px; display:flex; align-items:center; justify-content:center; }
  .qr canvas, .qr img{ display:block; }
  .qrmiss{ font-size:11px; color:#888; text-align:center; }
  .acts{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:12px; width:100%; }
  .btn{ border:1px solid var(--bd); background:var(--card2); color:var(--tx); border-radius:9px; padding:7px 12px; font-size:12.5px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
  .btn.primary{ background:var(--ac); border-color:var(--ac); color:#fff; }
  .hint{ color:var(--mu); font-size:11.5px; margin-top:7px; text-align:center; }
  .foot{ color:var(--mu); font-size:12px; text-align:center; margin-top:26px; }
  .toast{ position:fixed; inset-inline:0; bottom:20px; margin:auto; width:max-content; max-width:90%; background:var(--ac); color:#fff; padding:9px 16px; border-radius:999px; font-size:13px; opacity:0; transform:translateY(8px); transition:.2s; pointer-events:none; }
  .toast.show{ opacity:1; transform:none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand"><span class="logo"></span><span>Nova</span></div>
      <span class="spacer"></span>
      <div class="seg" id="lang"><button data-l="fa">FA</button><button data-l="en">EN</button></div>
      <div class="seg" id="theme"><button data-t="dark">🌙</button><button data-t="light">☀️</button></div>
    </div>
    <div class="sub" id="subtitle"></div>

    <div class="rawrow">
      <code id="rawsub">…</code>
      <button class="btn" id="copyraw"></button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="foot" id="foot"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://nova-panel.github.io/qrcode.min.js"></script>
  <script>
  (function(){
    var I18N = {
      en: { subtitle:'Pick your app, scan the QR or tap Add. Same servers in every app.', sub_user:'Configs for ', raw:'Subscription link', copy:'Copy', copied:'Copied', copyraw:'Copy subscription link', add:'Add to app', scanhint:'or scan this in your app', qrmiss:'QR unavailable — use Copy', foot:'Powered by Nova Proxy' },
      fa: { subtitle:'اپ خود را انتخاب کن، QR را اسکن کن یا روی «افزودن» بزن. سرورها در همه‌ی اپ‌ها یکی است.', sub_user:'کانفیگ‌های ', raw:'لینک اشتراک', copy:'کپی', copied:'کپی شد', copyraw:'کپی لینک اشتراک', add:'افزودن به اپ', scanhint:'یا این را در اپ خود اسکن کن', qrmiss:'QR در دسترس نیست — از «کپی» استفاده کن', foot:'قدرت‌گرفته از Nova Proxy' }
    };
    var lang = (function(){ try{ return localStorage.getItem('nova-user-lang')||'fa'; }catch(e){ return 'fa'; } })();
    var theme = document.documentElement.dataset.theme || 'dark';

    // Build the per-format subscription URL from the current page URL, preserving the user's
    // identity params (token / u / sub) and only swapping the format flag.
    function subFor(fmt){
      var u = new URL(location.href);
      ['b64','base64','clash','sb','singbox','surge','quanx','loon','target','page','hub'].forEach(function(p){ u.searchParams.delete(p); });
      var s = u.toString();
      if (!fmt) return s;
      return s + (s.indexOf('?')>-1 ? '&' : '?') + (fmt==='b64' ? 'b64' : fmt);
    }
    function uname(){ try{ var u=new URL(location.href); return u.searchParams.get('u')||u.searchParams.get('sub')||''; }catch(e){ return ''; } }

    var CLIENTS = [
      { name:'Hiddify',  color:'#7c5cff', rec:true,  fmt:'b64',     deep:function(u){ return 'hiddify://import/'+u; } },
      { name:'v2rayNG',  color:'#2563eb', rec:false, fmt:'b64',     deep:function(u){ return 'v2rayng://install-config?url='+encodeURIComponent(u); } },
      { name:'Streisand',color:'#0ea5e9', rec:false, fmt:'b64',     deep:function(u){ return 'streisand://import/'+u; } },
      { name:'FlClash',  color:'#0ea5c4', rec:true,  fmt:'clash',   deep:function(u){ return 'clash://install-config?url='+encodeURIComponent(u); } },
      { name:'Clash Meta',color:'#10b981',rec:false, fmt:'clash',   deep:function(u){ return 'clash://install-config?url='+encodeURIComponent(u); } },
      { name:'Karing',   color:'#16a34a', rec:false, fmt:'clash',   deep:function(u){ return 'karing://install-config?url='+encodeURIComponent(u)+'&name=Nova'; } },
      { name:'NekoBox',  color:'#f59e0b', rec:false, fmt:'singbox', deep:function(u){ return 'sing-box://import-remote-profile?url='+encodeURIComponent(u); } },
      { name:'sing-box', color:'#64748b', rec:false, fmt:'singbox', deep:function(u){ return 'sing-box://import-remote-profile?url='+encodeURIComponent(u); } }
    ];

    function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){ t.classList.remove('show'); },1400); }
    function copy(text){ try{ navigator.clipboard.writeText(text); }catch(e){ var ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} document.body.removeChild(ta); } toast(I18N[lang].copied); }

    function render(){
      var t = I18N[lang];
      document.documentElement.lang = lang; document.documentElement.dir = lang==='fa'?'rtl':'ltr';
      var who = uname();
      document.getElementById('subtitle').innerHTML = (who ? (t.sub_user+'<span class="uname">'+who.replace(/</g,'&lt;')+'</span> — ') : '') + t.subtitle;
      document.getElementById('foot').textContent = t.foot;
      var rawUrl = subFor('b64');
      document.getElementById('rawsub').textContent = rawUrl;
      var cr = document.getElementById('copyraw'); cr.textContent = '📋 '+t.copyraw; cr.onclick=function(){ copy(rawUrl); };

      var grid = document.getElementById('grid'); grid.innerHTML='';
      CLIENTS.forEach(function(c){
        var sub = subFor(c.fmt);
        var card = document.createElement('div'); card.className='card'+(c.rec?' rec':'');
        card.innerHTML =
          '<div class="ch"><span class="ic" style="background:'+c.color+'">'+c.name[0].toUpperCase()+'</span><span class="nm">'+c.name+'</span>'+(c.rec?'<span class="pill">★</span>':'')+'</div>'+
          '<div class="qr"></div>'+
          '<div class="hint">'+t.scanhint+'</div>'+
          '<div class="acts"><a class="btn primary" href="'+c.deep(sub)+'">＋ '+t.add+'</a><button class="btn" data-copy="'+sub.replace(/"/g,'&quot;')+'">📋 '+t.copy+'</button></div>';
        grid.appendChild(card);
        var qbox = card.querySelector('.qr');
        try {
          if (window.QRCode) { new QRCode(qbox, { text: sub, width:132, height:132, correctLevel: QRCode.CorrectLevel.M }); }
          else { qbox.innerHTML = '<span class="qrmiss">'+t.qrmiss+'</span>'; }
        } catch(e){ qbox.innerHTML = '<span class="qrmiss">'+t.qrmiss+'</span>'; }
      });
      grid.querySelectorAll('[data-copy]').forEach(function(b){ b.onclick=function(){ copy(b.getAttribute('data-copy')); }; });
      document.querySelectorAll('#lang button').forEach(function(b){ b.classList.toggle('on', b.dataset.l===lang); });
      document.querySelectorAll('#theme button').forEach(function(b){ b.classList.toggle('on', b.dataset.t===theme); });
    }

    document.getElementById('lang').onclick=function(e){ var b=e.target.closest('button'); if(!b) return; lang=b.dataset.l; try{ localStorage.setItem('nova-user-lang',lang); }catch(_){} render(); };
    document.getElementById('theme').onclick=function(e){ var b=e.target.closest('button'); if(!b) return; theme=b.dataset.t; document.documentElement.dataset.theme=theme; try{ localStorage.setItem('nova-theme',theme); }catch(_){} render(); };

    // qrcode.min.js may load after this script; re-render once it's ready.
    if (!window.QRCode) { var tries=0; var iv=setInterval(function(){ if(window.QRCode || ++tries>20){ clearInterval(iv); render(); } }, 150); }
    render();
  })();
  </script>
</body>
</html>
